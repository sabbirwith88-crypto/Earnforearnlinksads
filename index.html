    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* বডি: লম্বা পেজ, ব্যাকগ্রাউন্ড */
        body {
            min-height: 300vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        html {
            scroll-behavior: auto;
        }

        /* ব্যাকগ্রাউন্ড আর্ট (নরম আভা) */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.4;
            mix-blend-mode: soft-light;
        }

        .orb1 {
            width: 60vw;
            height: 60vw;
            background: #3b2b7c;
            top: -20%;
            left: -20%;
            animation: drift 24s infinite alternate ease-in-out;
        }

        .orb2 {
            width: 50vw;
            height: 50vw;
            background: #1f4b6e;
            bottom: -15%;
            right: -15%;
            animation: drift 28s infinite alternate-reverse ease-in-out;
        }

        .orb3 {
            width: 45vw;
            height: 45vw;
            background: #5e2a5e;
            top: 40%;
            left: 60%;
            animation: floatSlow 32s infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(8%, 12%) rotate(8deg); }
        }

        @keyframes floatSlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-6%, -10%) scale(1.2); }
        }

        /* একমাত্র বাটন: গ্লাসমরফিজম, স্থির */
        .divine-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            cursor: pointer;
            background: rgba(20, 25, 45, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 80px;
            padding: 1.2rem 2.4rem;
            font-size: 1.6rem;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 1px;
            color: #f0eef7;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .divine-button span {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 4px rgba(255,255,200,0.6));
            transition: transform 0.2s;
        }

        .divine-button:hover {
            background: rgba(40, 48, 78, 0.55);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 18px 38px -12px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(210, 180, 255, 0.3);
            transform: translate(-50%, -50%) scale(1.02);
        }

        .divine-button:active {
            transform: translate(-50%, -50%) scale(0.97);
            transition: 0.05s;
            background: rgba(60, 68, 108, 0.7);
        }

        /* ক্লিক রিপল ইফেক্ট */
        .click-ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,240,0.7) 0%, rgba(180, 160, 255, 0) 80%);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripplePop 0.65s ease-out forwards;
            z-index: 200;
        }

        @keyframes ripplePop {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0.8;
            }
            100% {
                width: 280px;
                height: 280px;
                opacity: 0;
            }
        }

        /* টোস্ট মেসেজ (ক্ষণস্থায়ী) */
        .ephemeral-toast {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(20px);
            color: #ddd9ff;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            font-family: monospace;
        }

        .ephemeral-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }

        /* বিজ্ঞাপন কন্টেইনার — পেজের সাথে মানানসই, স্ক্রল হবে */
        .ad-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 2rem auto;
            padding: 1rem;
            pointer-events: auto;
            width: 100%;
            background: transparent;
        }

        /* মোবাইল রেস্পন্সিভ */
        @media (max-width: 550px) {
            .divine-button {
                padding: 0.9rem 1.5rem;
                font-size: 1.2rem;
                gap: 8px;
                white-space: nowrap;
            }
            .divine-button span {
                font-size: 1.3rem;
            }
            .ephemeral-toast {
                font-size: 0.75rem;
                bottom: 8%;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            background: #0b0e16;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f46b0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <script>
        (function() {
            // ------------------------------
            // অটো-স্ক্রল: দ্রুততর কিন্তু মৃদু (তারাতারি হবে)
            // ------------------------------
            let autoScrollActive = true;
            let scrollDirection = 1;   // 1 = নিচের দিকে, -1 = উপরের দিকে
            let scrollStep = 0.85;      // পূর্বে 0.42, এখন দ্বিগুণ গতিতে
            let animationFrameId = null;
            
            function getMaxScroll() {
                return document.documentElement.scrollHeight - window.innerHeight;
            }
            
            function smoothAutoScroll() {
                if (!autoScrollActive) return;
                
                const currentScroll = window.scrollY;
                const maxScroll = getMaxScroll();
                
                // প্রান্তে পৌঁছালে দিক পরিবর্তন
                if (scrollDirection === 1 && currentScroll + window.innerHeight >= document.documentElement.scrollHeight - 2) {
                    scrollDirection = -1;
                } else if (scrollDirection === -1 && currentScroll <= 2) {
                    scrollDirection = 1;
                }
                
                let newScrollY = currentScroll + (scrollStep * scrollDirection);
                newScrollY = Math.min(Math.max(newScrollY, 0), maxScroll);
                
                window.scrollTo({
                    top: newScrollY,
                    behavior: 'auto'
                });
                
                animationFrameId = requestAnimationFrame(smoothAutoScroll);
            }
            
            function startGentleScroll() {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                autoScrollActive = true;
                animationFrameId = requestAnimationFrame(smoothAutoScroll);
            }
            
            startGentleScroll();
            
            window.addEventListener('resize', () => {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                startGentleScroll();
            });
            
            // ------------------------------
            // বাটন ক্লিক হ্যান্ডলার
            // ------------------------------
            const button = document.getElementById('singleClickBtn');
            const toast = document.getElementById('toastMsg');
            
            function showTemporaryMessage(text, emoji = '✨') {
                if (!toast) return;
                toast.textContent = `${emoji} ${text} ${emoji}`;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 1300);
            }
            
            function createRippleEffect(event) {
                const ripple = document.createElement('div');
                ripple.classList.add('click-ripple');
                let clientX = event.clientX;
                let clientY = event.clientY;
                ripple.style.left = clientX + 'px';
                ripple.style.top = clientY + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => {
                    if (ripple && ripple.remove) ripple.remove();
                }, 700);
            }
            
            function handleButtonClick(e) {
                e.stopPropagation();
                createRippleEffect(e);
                
                button.style.transform = "translate(-50%, -50%) scale(0.96)";
                setTimeout(() => {
                    button.style.transform = "translate(-50%, -50%) scale(1)";
                }, 120);
                
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(12);
                }
                
                showTemporaryMessage("একবার ❤️ ক্লিক হয়েছে", "🌟");
                
                const ambient = document.querySelector('.ambient-glow');
                if (ambient) {
                    ambient.style.transition = 'filter 0.2s';
                    ambient.style.filter = 'brightness(1.05) drop-shadow(0 0 6px #a38eff)';
                    setTimeout(() => {
                        if (ambient) ambient.style.filter = '';
                    }, 250);
                }
            }
            
            if (button) {
                button.addEventListener('click', handleButtonClick);
                button.addEventListener('touchstart', (e) => {
                    handleButtonClick(e);
                });
            }
            
            console.log("✅ পেজ প্রস্তুত: দ্রুততর স্ক্রল + একক বাটন + সম্পূর্ণ মনিটাইজেশন যুক্ত হয়েছে");
        })();
    </script>
